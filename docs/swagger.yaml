        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invoices/{id}/payments:
    post:
      summary: Record a payment against an invoice (Transaction 4)
      tags: [Invoices]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 11
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, payment_method]
              properties:
                amount:
                  type: number
                  example: 821.70
                payment_method:
                  type: string
                  example: credit_card
                transaction_id:
                  type: string
                  example: TXN-TEST-001
                notes:
                  type: string
                  example: Full payment at checkout
      responses:
        '201':
          description: Payment recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Payment recorded successfully.
                  data:
                    type: object
                    properties:
                      payment:
                        type: object
                        properties:
                          payment_id:
                            type: integer
                            example: 61
                          amount:
                            type: string
                            example: "821.70"
                          payment_method:
                            type: string
                            example: credit_card
                          status:
                            type: string
                            example: completed
                      invoice:
                        type: object
                        properties:
                          invoice_id:
                            type: integer
                            example: 11
                          payment_status:
                            type: string
                            example: paid
        '400':
          description: Missing required fields or invoice already paid — transaction rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No token or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invoice not found — transaction rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'