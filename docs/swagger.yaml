          description: List of overdue invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        invoice_id:
                          type: integer
                          example: 11
                        invoice_number:
                          type: string
                          example: INV-2026-0011
                        total_amount:
                          type: string
                          example: "821.70"
                        payment_status:
                          type: string
                          example: unpaid
                        due_date:
                          type: string
                          example: "2026-02-14"
                        days_overdue:
                          type: integer
                          example: 15
                        first_name:
                          type: string
                          example: Robert
                        last_name:
                          type: string
                          example: Smith
                        email:
                          type: string
                          example: robert.smith@email.com
                        phone:
                          type: string
                          example: "+1-555-0101"
                        branch_name:
                          type: string
                          example: Grand Plaza NYC
        '401':
          description: No token or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied — Admin and Manager only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invoices/{id}:
    get:
      summary: Get single invoice by ID
      tags: [Invoices]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Invoice returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      invoice_id:
                        type: integer
                        example: 1
                      invoice_number:
                        type: string
                        example: INV-2026-0001
                      subtotal:
                        type: string
                        example: "596.00"
                      tax_amount:
                        type: string
                        example: "59.60"
                      total_amount:
                        type: string
                        example: "655.60"
                      payment_status:
                        type: string
                        example: unpaid
                      due_date:
                        type: string
                        example: "2026-03-05"
                      first_name:
                        type: string
                        example: Robert
                      last_name:
                        type: string
                        example: Smith
                      branch_name:
                        type: string
                        example: Grand Plaza NYC
                      room_number:
                        type: string
                        example: "101"
        '401':
          description: No token or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
